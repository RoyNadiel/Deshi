<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deshidratadora Control</title>
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1c1f2e;
        --border: #2a2d3e;
        --accent: #f97316;
        --accent2: #3b82f6;
        --red: #ef4444;
        --green: #22c55e;
        --blue: #00aaee;
        --yellow: #eab308;
        --text: #e2e8f0;
        --muted: #94a49b;
        --radius: 14px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        overscroll-behavior: none;
      }

      /* ---- Card ---- */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 2rem 1.8rem;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      }
      .card-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.6rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
      }
      .card-header .icon {
        font-size: 1.8rem;
        line-height: 1;
      }
      .card-header h1 {
        font-size: 1.25rem;
        font-weight: 700;
      }
      .card-header small {
        font-size: 0.75rem;
        color: var(--muted);
        display: block;
      }

      /* ---- Badge ---- */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        margin-bottom: 1.2rem;
      }
      .badge.off {
        background: rgba(100, 116, 139, 0.15);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .badge.active {
        background: rgba(59, 130, 246, 0.15);
        color: var(--accent2);
        border: 1px solid rgba(59, 130, 246, 0.3);
      }
      .badge.done {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .badge.config {
        background: rgba(234, 179, 8, 0.15);
        color: var(--yellow);
        border: 1px solid rgba(234, 179, 8, 0.3);
      }
      .badge .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .badge.off .dot {
        background: var(--muted);
      }
      .badge.active .dot {
        background: var(--accent2);
        animation: pulse 1.4s infinite;
      }
      .badge.done .dot {
        background: var(--green);
      }
      .badge.config .dot {
        background: var(--yellow);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* ---- Data grid ---- */
      .data-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 1.2rem;
      }
      .data-item {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.85rem 1rem;
      }
      .data-item .label {
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.3rem;
      }
      .data-item .value {
        font-size: 1.45rem;
        font-weight: 700;
      }
      .data-item .value.hot {
        color: var(--red);
      }
      .data-item .value.cool {
        color: var(--blue);
      }
      .data-item .value.grave {
        color: var(--red);
        animation: blink 1s infinite alternate;
      }
      @keyframes blink {
        from {
          opacity: 1;
        }
        to {
          opacity: 0.5;
        }
      }

      /* ---- Sliders de configuración ---- */
      .config-block {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem 1.1rem;
        margin-bottom: 0.85rem;
      }
      .config-block .cfg-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.65rem;
      }
      .config-block .cfg-label {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .config-block .cfg-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text);
      }
      .config-block .cfg-value span {
        font-size: 0.85rem;
        font-weight: 400;
        color: var(--muted);
      }
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        background: var(--border);
        border-radius: 999px;
        outline: none;
        cursor: pointer;
        touch-action: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.2);
        transition: box-shadow 0.2s;
      }
      input[type="range"]::-webkit-slider-thumb:active {
        box-shadow: 0 0 0 7px rgba(249, 115, 22, 0.3);
      }

      /* ---- Botones ---- */
      .btn {
        width: 100%;
        padding: 0.9rem 1rem;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.04em;
        transition:
          opacity 0.15s,
          transform 0.1s;
        margin-bottom: 0.6rem;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-start {
        background: var(--accent);
        color: #fff;
      }
      .btn-reset {
        background: var(--surface);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* ---- Progreso ---- */
      .progress-wrap {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.85rem 1rem;
        margin-bottom: 1.2rem;
      }
      .progress-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.6rem;
      }
      .progress-header .label {
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .progress-header .remaining {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--accent);
      }
      .bar-bg {
        height: 8px;
        background: var(--border);
        border-radius: 999px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        border-radius: 999px;
        transition: width 0.8s ease;
      }

      /* ---- Resistencia ---- */
      .heat-pill {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
      }
      .heat-pill .heat-icon {
        font-size: 1.2rem;
      }
      .heat-on {
        color: var(--red);
      }
      .heat-off {
        color: var(--green);
      }

      /* ---- Info ---- */
      .info-msg {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.85rem 1rem;
        font-size: 0.88rem;
        color: var(--muted);
        line-height: 1.5;
        margin-bottom: 1.2rem;
      }

      /* ---- Footer ---- */
      .footer {
        margin-top: 1.4rem;
        text-align: center;
        font-size: 0.7rem;
        color: var(--muted);
      }
      #last-update {
        opacity: 0.7;
      }

      /* ---- Toast de feedback ---- */
      #toast {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.65rem 1.2rem;
        font-size: 0.85rem;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        white-space: nowrap;
      }
      #toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <span class="icon">🌿</span>
        <div>
          <h1>Deshidratadora</h1>
          <small>Panel de Control</small>
        </div>
      </div>

      <div id="content">
        <div class="info-msg">Conectando...</div>
      </div>

      <div class="footer">
        <span id="last-update"></span>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      // ---------- Utilidades ----------
      function fmtTime(totalSecs) {
        const h = Math.floor(totalSecs / 3600);
        const m = Math.floor((totalSecs % 3600) / 60);
        const s = totalSecs % 60;
        if (h > 0) return h + "h " + String(m).padStart(2, "0") + "m";
        if (m > 0) return m + "m " + String(s).padStart(2, "0") + "s";
        return s + "s";
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._tid);
        t._tid = setTimeout(() => t.classList.remove("show"), 2500);
      }

      // ---------- Estado local de sliders ----------
      let cfgHours = 4;
      let cfgMins = 0;
      let cfgTemp = 40;

      function fmtDuration(h, m) {
        if (h === 0) return String(m).padStart(2, "0") + "m";
        return h + "h " + String(m).padStart(2, "0") + "m";
      }

      // ---------- Render ----------
      function renderContent(d) {
        let html = "";

        if (d.done) {
          // ---- FINALIZADO ----
          html +=
            '<div class="badge done"><span class="dot"></span>FINALIZADO</div>';
          html +=
            '<div class="info-msg">✅ El proceso ha terminado exitosamente.</div>';
          html +=
            '<button class="btn btn-reset" id="btn-reset">🔄 Resetear</button>';
        } else if (d.on) {
          // ---- EN PROCESO ----
          const isHot = d.heating;
          html +=
            '<div class="badge active"><span class="dot"></span>EN PROCESO</div>';
          html += '<div class="data-grid">';
          html +=
            '<div class="data-item"><div class="label">Objetivo</div>' +
            '<div class="value">' +
            d.target +
            "°</div></div>";
          html +=
            '<div class="data-item"><div class="label">Actual</div>' +
            '<div class="value ' +
            (isHot ? "hot" : "cool") +
            '">' +
            d.current +
            "°</div></div>";

          const humGrave = d.humidity >= 70 ? "grave" : "";
          html +=
            '<div class="data-item"><div class="label">Humedad</div>' +
            '<div class="value ' +
            humGrave +
            '">' +
            d.humidity +
            "%</div></div>";
          html += "</div>";

          html +=
            '<div class="heat-pill ' +
            (isHot ? "heat-on" : "heat-off") +
            '">' +
            '<span class="heat-icon">' +
            (isHot ? "🔥" : "✅") +
            "</span>" +
            "Resistencia: " +
            (isHot ? "Calentando" : "Estable") +
            "</div>";

          const pct = Math.min(100, Math.max(0, d.progress));
          html +=
            '<div class="progress-wrap">' +
            '<div class="progress-header">' +
            '<span class="label">Tiempo restante</span>' +
            '<span class="remaining">' +
            fmtTime(d.remaining) +
            "</span>" +
            "</div>" +
            '<div class="bar-bg"><div class="bar-fill" style="width:' +
            pct +
            '%"></div></div>' +
            "</div>";

          html +=
            '<button class="btn btn-reset" id="btn-reset">⏹ Detener y Resetear</button>';
        } else {
          // ---- CONFIGURACIÓN ----
          html +=
            '<div class="badge config"><span class="dot"></span>CONFIGURACIÓN</div>';

          html +=
            '<div class="config-block">' +
            '<div class="cfg-header">' +
            '<span class="cfg-label">⏱ Duración</span>' +
            '<span class="cfg-value" id="lbl-hours">' +
            fmtDuration(cfgHours, cfgMins) +
            "</span>" +
            "</div>" +
            '<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem">' +
            '<span style="font-size:.7rem;color:var(--muted);min-width:2rem">Hora</span>' +
            '<input type="range" id="sl-hours" min="0" max="24" value="' +
            cfgHours +
            '" style="flex:1">' +
            '<span style="font-size:.82rem;font-weight:700;min-width:2.5rem;text-align:right" id="lbl-h-val">' +
            cfgHours +
            "h</span>" +
            "</div>" +
            '<div style="display:flex;align-items:center;gap:.6rem">' +
            '<span style="font-size:.7rem;color:var(--muted);min-width:2rem">Min</span>' +
            '<input type="range" id="sl-mins" min="0" max="55" step="5" value="' +
            cfgMins +
            '" style="flex:1">' +
            '<span style="font-size:.82rem;font-weight:700;min-width:2.5rem;text-align:right" id="lbl-m-val">' +
            String(cfgMins).padStart(2, "0") +
            "m</span>" +
            "</div>" +
            "</div>";

          html +=
            '<div class="config-block">' +
            '<div class="cfg-header">' +
            '<span class="cfg-label">🌡️ Temperatura</span>' +
            '<span class="cfg-value" id="lbl-temp">' +
            cfgTemp +
            " <span>°C</span></span>" +
            "</div>" +
            '<input type="range" id="sl-temp" min="30" max="70" value="' +
            cfgTemp +
            '">' +
            "</div>";

          html +=
            '<button class="btn btn-start" id="btn-start">▶ Iniciar Proceso</button>';
        }

        document.getElementById("content").innerHTML = html;

        // Actualizar timestamp
        const now = new Date();
        document.getElementById("last-update").textContent =
          "Actualizado: " +
          now.toLocaleTimeString("es", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
      }

      // ---------- MOCK FOR SCREENSHOTS -----------
      let states = [
        {
          on: false,
          done: false,
          target: 40,
          current: 28,
          humidity: 55,
          remaining: 0,
          progress: 0,
        },
        {
          on: true,
          done: false,
          heating: true,
          target: 40,
          current: 35.5,
          humidity: 45,
          remaining: 3600 * 3,
          progress: 25,
        },
        {
          on: true,
          done: false,
          heating: false,
          target: 40,
          current: 40.1,
          humidity: 75,
          remaining: 3600 * 2,
          progress: 50,
        },
        {
          on: false,
          done: true,
          target: 40,
          current: 30,
          humidity: 50,
          remaining: 0,
          progress: 100,
        },
      ];
      let stateIdx = 0;

      function fetchStatus() {
        renderContent(states[stateIdx]);
      }

      const switcher = document.createElement("div");
      switcher.style.position = "fixed";
      switcher.style.top = "10px";
      switcher.style.right = "10px";
      switcher.style.zIndex = "9999";

      states.forEach((s, i) => {
        let btn = document.createElement("button");
        btn.textContent =
          i === 0 ? "Config" : i === 1 ? "Activo" : i === 2 ? "Grave" : "Fin";
        btn.onclick = () => {
          stateIdx = i;
          fetchStatus();
        };
        btn.style.margin = "0 5px";
        btn.style.padding = "8px 12px";
        btn.style.background = "#3b82f6";
        btn.style.color = "#fff";
        btn.style.border = "none";
        btn.style.borderRadius = "5px";
        btn.style.cursor = "pointer";
        btn.style.fontWeight = "bold";
        switcher.appendChild(btn);
      });

      document.body.appendChild(switcher);

      // Init
      setTimeout(() => fetchStatus(), 500);
    </script>
  </body>
</html>
