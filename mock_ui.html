<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deshi - Premium Control</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inconsolata:wght@200..900&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #030712;
        --surface: rgba(17, 24, 39, 0.7);
        --card-border: rgba(255, 255, 255, 0.08);
        --accent: #f97316;
        --accent-glow: rgba(249, 115, 22, 0.3);
        --blue: #3b82f6;
        --blue-glow: rgba(59, 130, 246, 0.3);
        --red: #ef4444;
        --green: #10b981;
        --purple: #8b5cf6;
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --radius-lg: 24px;
        --radius-md: 16px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
      }

      body {
        background: var(--bg);
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(249, 115, 22, 0.1) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            rgba(59, 130, 246, 0.1) 0px,
            transparent 50%
          );
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        overflow: hidden;
      }

      /* Ambient Background Elements */
      .ambient-blob {
        position: fixed;
        width: 400px;
        height: 400px;
        filter: blur(80px);
        border-radius: 50%;
        z-index: -1;
        opacity: 0.4;
        animation: float 20s infinite alternate ease-in-out;
      }
      .blob-1 {
        background: var(--accent);
        top: -10%;
        left: -10%;
      }
      .blob-2 {
        background: var(--blue);
        bottom: -10%;
        right: -10%;
        animation-delay: -10s;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(50px, 50px) scale(1.1);
        }
      }

      /* Glass Card */
      .card {
        background: var(--surface);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--card-border);
        border-radius: var(--radius-lg);
        padding: 2.5rem;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .logo-icon {
        width: 42px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.85rem;
      }

      .brand-text h1 {
        font-family: "Audiowide", sans-serif;
        font-size: 1.6rem;
        font-weight: 400;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        background: linear-gradient(to bottom, #fff, #9ca3af);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .brand-text p {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      /* Status Badge */
      .status-badge {
        padding: 0.5rem 1rem;
        border-radius: 100px;
        font-size: 0.72rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: white;
      }

      .status-config {
        background: linear-gradient(135deg, var(--accent), #ea580c);
        box-shadow: 0 4px 15px var(--accent-glow);
      }

      .status-active {
        background: linear-gradient(135deg, var(--blue), #1d4ed8);
        box-shadow: 0 4px 15px var(--blue-glow);
      }

      .status-done {
        background: linear-gradient(135deg, var(--green), #059669);
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: white;
      }

      .status-active .dot {
        box-shadow: 0 0 8px white;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.15;
        }
      }

      /* Metrics Grid */
      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .metric-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--card-border);
        border-radius: var(--radius-md);
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        transition: transform 0.2s;
      }

      .metric-card:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.05);
      }

      .metric-label {
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .metric-value {
        font-family: "Outfit", sans-serif;
        font-size: 2rem;
        font-weight: 700;
      }

      .metric-value span {
        font-size: 1rem;
        color: var(--text-muted);
        margin-left: 2px;
      }

      .text-hot {
        color: var(--red);
        text-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
      }
      .text-cool {
        color: var(--blue);
      }
      .text-warning {
        color: var(--accent);
        animation: flicker 1s infinite alternate;
      }

      @keyframes flicker {
        from {
          opacity: 1;
        }
        to {
          opacity: 0.7;
        }
      }

      /* Fan Mode Pill */
      .fan-status {
        grid-column: span 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.05)
        );
        border: 1px solid var(--card-border);
        border-radius: var(--radius-md);
        padding: 1rem 1.25rem;
        margin-bottom: 1.5rem;
      }

      .fan-info {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .fan-icon {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--blue);
        animation: spin 3s infinite linear;
      }

      .fan-icon svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .fan-icon.stopped {
        animation: none;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .fan-mode-tag {
        padding: 0.25rem 0.75rem;
        border-radius: 6px;
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .tag-soplar {
        background: rgba(59, 130, 246, 0.15);
        color: var(--blue);
      }
      .tag-extraer {
        background: rgba(139, 92, 246, 0.15);
        color: var(--purple);
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
      }

      /* Progress Section */
      .progress-section {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--card-border);
        border-radius: var(--radius-md);
        padding: 1.25rem;
        margin-bottom: 1.5rem;
      }

      .progress-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.75rem;
      }

      .time-rem {
        font-family: "Outfit", sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--accent);
      }

      .progress-bar-bg {
        height: 8px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 100px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--blue), var(--accent));
        border-radius: 100px;
        transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
      }

      .progress-bar-fill::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        animation: shine 2s infinite;
      }

      @keyframes shine {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      /* Controls / Sliders */
      .config-input {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        margin-bottom: 2rem;
      }

      .slider-group {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .slider-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-muted);
      }

      .slider-label span:last-child {
        color: var(--text);
        font-size: 1rem;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 100px;
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 22px;
        height: 22px;
        background: var(--text);
        border: 4px solid var(--accent);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        transition: transform 0.1s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
      }

      /* Buttons */
      .btn {
        width: 100%;
        padding: 1.1rem;
        border-radius: var(--radius-md);
        border: none;
        font-family: "Outfit", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-primary {
        background: var(--accent);
        color: white;
        box-shadow: 0 10px 20px -5px var(--accent-glow);
      }

      .btn-primary:hover {
        background: #fa8231;
        transform: translateY(-2px);
        box-shadow: 0 15px 25px -5px var(--accent-glow);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border: 1px solid var(--card-border);
        margin-top: 0.75rem;
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .btn:active {
        transform: translateY(0) scale(0.98);
      }

      /* Footer */
      .footer {
        margin-top: 2rem;
        text-align: center;
        font-size: 0.7rem;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: rgba(17, 24, 39, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid var(--card-border);
        padding: 1rem 2rem;
        border-radius: 100px;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text);
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 1000;
      }

      #toast.show {
        transform: translateX(-50%) translateY(0);
      }

      /* Responsive */
      @media (max-width: 480px) {
        .card {
          padding: 1.5rem;
        }
        .metric-value {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

    <div class="card">
      <header class="header">
        <div class="brand">
          <div class="logo-icon">🌿</div>
          <div class="brand-text">
            <h1>Deshi</h1>
            <p>Smart Dehydrator</p>
          </div>
        </div>
        <div id="status-badge-container">
          <!-- Status Badge Injected Here -->
        </div>
      </header>

      <main id="main-content">
        <!-- Dynamic Content Injected Here -->
        <div
          style="text-align: center; padding: 2rem; color: var(--text-muted)"
        >
          Inicializando sistema...
        </div>
      </main>

      <footer class="footer">
        <span id="update-time">Actualizado: --:--:--</span>
        <span style="opacity: 0.4">v2.0 Premium Interface</span>
      </footer>
    </div>

    <div id="toast">Notificación</div>

    <!-- MOCK SWITCHER (ONLY FOR PROTOTYPING) -->
    <div
      id="debug-switcher"
      style="
        position: fixed;
        top: 10px;
        right: 10px;
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        max-width: 200px;
      "
    ></div>

    <script>
      // Utilities
      const formatTime = (s) => {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${sec}s` : `${sec}s`;
      };

      const showToast = (msg) => {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
      };

      // UI State management
      const renderBadge = (key) => {
        const badges = {
          config:
            '<div class="status-badge status-config"><div class="dot"></div>CONFIGURACIÓN</div>',
          active:
            '<div class="status-badge status-active"><div class="dot"></div>EN PROCESO</div>',
          done: '<div class="status-badge status-done"><div class="dot"></div>FINALIZADO</div>',
        };
        document.getElementById("status-badge-container").innerHTML =
          badges[key] || badges.config;
      };

      const renderUI = (data) => {
        const container = document.getElementById("main-content");
        let html = "";

        if (data.done) {
          html = `
                    <div style="text-align:center; padding: 1rem 0 2rem 0;">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">✨</div>
                        <h2 style="font-family:'Outfit'; margin-bottom: 0.5rem;">¡Listo!</h2>
                        <p style="color:var(--text-muted); margin-bottom: 2rem;">El proceso de deshidratación ha terminado correctamente.</p>
                        <button class="btn btn-secondary" onclick="handleAction('reset')">🔄 Volver a Inicio</button>
                    </div>
                `;
          renderBadge("done");
        } else if (data.on) {
          const isGrave = data.humidity >= 70;

          html = `
                    <div class="metrics">
                        <div class="metric-card">
                            <span class="metric-label">🌡️ Objetivo</span>
                            <div class="metric-value">${data.target}<span>°C</span></div>
                        </div>
                        <div class="metric-card">
                            <span class="metric-label">🔥 Actual</span>
                            <div class="metric-value ${data.heating ? "text-hot" : "text-cool"}">${data.current.toFixed(1)}<span>°C</span></div>
                        </div>
                        <div class="metric-card" style="grid-column: span 2">
                            <span class="metric-label">💧 Humedad Ambiente</span>
                            <div class="metric-value ${isGrave ? "text-warning" : ""}">${data.humidity.toFixed(1)}<span>%</span></div>
                        </div>
                    </div>

                    <div class="fan-status">
                        <div class="fan-info">
                            <div class="fan-icon">
                               <svg viewBox="0 0 24.00 24.00" xmlns="http://www.w3.org/2000/svg" fill="#475dff" stroke="#475dff" transform="rotate(270)matrix(-1, 0, 0, -1, 0, 0)" stroke-width="0.00024000000000000003"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round" stroke="#CCCCCC" stroke-width="0.096"></g><g id="SVGRepo_iconCarrier"> <rect width="24" height="24" fill="none"></rect> <path d="M12,11a1,1,0,1,0,1,1,1,1,0,0,0-1-1m.5-9C17,2,17.1,5.57,14.73,6.75a3.36,3.36,0,0,0-1.62,2.47,3.17,3.17,0,0,1,1.23.91C18,8.13,22,8.92,22,12.5c0,4.5-3.58,4.6-4.75,2.23a3.44,3.44,0,0,0-2.5-1.62,3.24,3.24,0,0,1-.91,1.23c2,3.69,1.2,7.66-2.38,7.66C7,22,6.89,18.42,9.26,17.24a3.46,3.46,0,0,0,1.62-2.45,3,3,0,0,1-1.25-.92C5.94,15.85,2,15.07,2,11.5,2,7,5.54,6.89,6.72,9.26A3.39,3.39,0,0,0,9.2,10.87a2.91,2.91,0,0,1,.92-1.22C8.13,6,8.92,2,12.48,2Z"></path> </g></svg>
                            </div>
                            <div>
                                <p style="font-size: 1rem; font-weight: 600;">Ventilación</p>
                                <p style="font-size: 0.7rem; color: var(--text-muted);">Velocidad adaptativa</p>
                            </div>
                        </div>
                        <span class="fan-mode-tag tag-soplar" style="font-size: 0.85rem;">${data.fanSpeed || 0}%</span>
                    </div>

                    <div class="progress-section">
                        <div class="progress-header">
                            <span class="metric-label">⏱️ Restante</span>
                            <span class="time-rem">${formatTime(data.remaining)}</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${data.progress}%"></div>
                        </div>
                    </div>

                    <button class="btn btn-secondary" onclick="handleAction('reset')">⏹ Detener Sistema</button>
                `;
          renderBadge("active");
        } else {
          html = `
                    <div class="config-input">
                        <div class="slider-group">
                            <div class="slider-label">
                                <span>⏱️ DURACIÓN TOTAL</span>
                                <span id="val-time">${Math.floor(data.minutes / 60)}h ${data.minutes % 60}m</span>
                            </div>
                            <input type="range" id="sl-minutes" min="60" max="1440" step="15" value="${data.minutes}" oninput="updateConfig('minutes', this.value)">
                        </div>
                        <div class="slider-group">
                            <div class="slider-label">
                                <span>🌡️ TEMPERATURA</span>
                                <span id="val-temp">${data.target}°C</span>
                            </div>
                            <input type="range" id="sl-temp" min="30" max="75" value="${data.target}" oninput="updateConfig('temp', this.value)">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="handleAction('start')">
                        <span>▶</span> INICIAR DESHIDRATACIÓN
                    </button>
                `;
          renderBadge("config");
        }

        container.innerHTML = html;
        document.getElementById("update-time").textContent =
          `Actualizado: ${new Date().toLocaleTimeString()}`;
      };

      // Mock state for prototyping
      let currentState = {
        on: false,
        done: false,
        heating: false,
        target: 45,
        current: 24.5,
        humidity: 42.0,
        fanSpeed: 0,
        minutes: 240,
        remaining: 0,
        progress: 0,
      };

      const updateConfig = (key, val) => {
        currentState[key] = parseInt(val);
        if (key === "minutes") {
          document.getElementById("val-time").textContent =
            `${Math.floor(val / 60)}h ${val % 60}m`;
        } else {
          document.getElementById("val-temp").textContent = `${val}°C`;
        }
      };

      const handleAction = (action) => {
        if (action === "start") {
          currentState.on = true;
          currentState.remaining = currentState.minutes * 60;
          currentState.progress = 0;
        } else if (action === "reset") {
          currentState.on = false;
          currentState.done = false;
        }
        renderUI(currentState);
        showToast(
          action === "start" ? "🚀 Proceso Iniciado" : "⏹ Sistema Detenido",
        );
      };

      // DEBUG BOX
      const debugStates = [
        {
          label: "Config",
          state: {
            on: false,
            done: false,
            target: 45,
            current: 24,
            humidity: 40,
            fanSpeed: 0,
            minutes: 300,
          },
        },
        {
          label: "Cocinando",
          state: {
            on: true,
            done: false,
            heating: true,
            target: 50,
            current: 42,
            humidity: 45,
            fanSpeed: 100,
            remaining: 7200,
            progress: 30,
          },
        },
        {
          label: "Humedad!",
          state: {
            on: true,
            done: false,
            heating: false,
            target: 50,
            current: 50.5,
            humidity: 78,
            fanSpeed: 66,
            remaining: 5400,
            progress: 50,
          },
        },
        { label: "Terminado", state: { on: false, done: true, fanSpeed: 0 } },
      ];

      const dbg = document.getElementById("debug-switcher");
      debugStates.forEach((s) => {
        const b = document.createElement("button");
        b.textContent = s.label;
        b.style.cssText =
          "background:var(--blue); border:none; color:white; padding:5px 10px; border-radius:4px; font-size:10px; cursor:pointer;";
        b.onclick = () => {
          currentState = { ...currentState, ...s.state };
          renderUI(currentState);
        };
        dbg.appendChild(b);
      });

      // Initialize
      renderUI(currentState);
    </script>
  </body>
</html>
